<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stats Section</title>

  <!-- LATO FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
    }

    /* SECTION */
    .stats-section {
      position: relative;
      padding: 80px 20px;
      text-align: center;

      background-image: url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      color: #fff;
      overflow: hidden;
    }

    /* DARK OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    /* WRAPPER = enables mobile scroll */
    .stats-wrapper {
      width: 100%;
      overflow-x: auto;
      padding: 0 10px;
      position: relative;
      z-index: 1;
    }

    /* FIXED LAYOUT WIDTH */
    .stats-container {
      display: flex;
      justify-content: space-between;
      gap: 40px;

      width: 900px;   /* 🔥 locks layout size */
      margin: 0 auto;
    }

    .stat {
      width: 200px;
      flex: 0 0 auto; /* prevents shrinking */
    }

    .icon {
      width: 60px;
      height: 60px;
      margin-bottom: 10px;
    }

    .counter {
      font-size: 36px;
      margin: 5px 0;
      font-weight: 700;
    }

    .stat p {
      margin: 0;
      opacity: 0.85;
      font-weight: 400;
    }
  </style>
</head>

<body>

<div class="stats-section" id="stats">
  <div class="overlay"></div>

  <!-- WRAPPER ADDED -->
  <div class="stats-wrapper">
    <div class="stats-container">

      <div class="stat">
        <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/ffd6fab1-4852-4a32-8523-d6836a0d7b71_wo.png" />
        <h2 class="counter" data-target="8904">0</h2>
        <p>Players</p>
      </div>

      <div class="stat">
        <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/16337cdf-affb-41c0-bd33-c43493b57f50_wo.png" />
        <h2 class="counter" data-target="418">0</h2>
        <p>Teams</p>
      </div>

      <div class="stat">
        <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/23cbbc70-be02-40bf-a9fb-24c26eeaba20_wo.png" />
        <h2 class="counter" data-target="10000">0</h2>
        <p>Volunteers</p>
      </div>

      <div class="stat">
        <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/1438f624-c050-416f-9841-509c0c0f602f_wo.png" />
        <h2 class="counter" data-target="5">0</h2>
        <p>Affiliated Clubs</p>
      </div>

    </div>
  </div>
</div>

<script>
  const counters = document.querySelectorAll('.counter');
  let hasAnimated = false;

  function runCounters() {
    if (hasAnimated) return;
    hasAnimated = true;

    counters.forEach(counter => {
      const target = +counter.getAttribute('data-target');
      let count = 0;

      const step = () => {
        const increment = Math.ceil(target / 100);
        count += increment;

        if (count < target) {
          counter.innerText = count;
          requestAnimationFrame(step);
        } else {
          counter.innerText = target;
        }
      };

      step();
    });
  }

  // Scroll trigger
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        runCounters();
        observer.disconnect();
      }
    });
  }, {
    threshold: 0.4
  });

  observer.observe(document.getElementById("stats"));
</script>

</body>
</html>
