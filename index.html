<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stats Section</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: #fff;
    }

    .stats-section {
      position: relative;
      padding: 60px 20px;
      text-align: center;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 0;
    }

    .stats-container {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
    }

    .stat {
      width: 180px;
    }

    .icon {
      width: 60px;
      height: 60px;
      margin-bottom: 10px;
    }

    .counter {
      font-size: 32px;
      margin: 5px 0;
      font-weight: bold;
    }

    .stat p {
      margin: 0;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="stats-section">
  <div class="overlay"></div>

  <div class="stats-container">

    <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/ffd6fab1-4852-4a32-8523-d6836a0d7b71_wo.png" />
      <h2 class="counter" data-target="8904">0</h2>
      <p>Players</p>
    </div>

    <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/16337cdf-affb-41c0-bd33-c43493b57f50_wo.png" />
      <h2 class="counter" data-target="418">0</h2>
      <p>Teams</p>
    </div>

    <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/23cbbc70-be02-40bf-a9fb-24c26eeaba20_wo.png" />
      <h2 class="counter" data-target="10000">0</h2>
      <p>Volunteers</p>
    </div>

    <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/1438f624-c050-416f-9841-509c0c0f602f_wo.png" />
      <h2 class="counter" data-target="5">0</h2>
      <p>Affiliated Clubs</p>
    </div>

  </div>
</div>

<script>
  // Animated counter
  const counters = document.querySelectorAll('.counter');

  counters.forEach(counter => {
    const updateCount = () => {
      const target = +counter.getAttribute('data-target');
      const count = +counter.innerText;

      const increment = Math.ceil(target / 100);

      if (count < target) {
        counter.innerText = count + increment;
        setTimeout(updateCount, 20);
      } else {
        counter.innerText = target;
      }
    };

    updateCount();
  });
</script>

</body>
</html>
