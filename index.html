<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stats Section</title>

  <!-- ✅ LATO FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
    }

    .stats-section {
      position: relative;
      padding: 80px 20px;
      text-align: center;

      /* Background image */
      background-image: url("https://prodcdn.sporty.co.nz/cms/10035/66425/979288/84f12279-cce2-4521-99c5-0199d8a93915_wo.jpg");
      background-size: cover;
      background-position: bottom;
      background-repeat: no-repeat;

      color: #fff;
      overflow: hidden;
    }

    /* Dark overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    .stats-container {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
    }

    .stat {
      width: 180px;
    }

    .icon {
      width: 60px;
      height: 60px;
      margin-bottom: 10px;
    }

    .counter {
      font-size: 36px;
      margin: 5px 0;
      font-weight: 700;
    }

    .stat p {
      margin: 0;
      opacity: 0.85;
      font-weight: 400;
    }
  </style>
</head>

<body>

<div class="stats-section" id="stats">
  <div class="overlay"></div>

  <div class="stats-container">

    <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/ffd6fab1-4852-4a32-8523-d6836a0d7b71_wo.png" />
      <h2 class="counter" data-target="23600">0</h2>
      <p>Players</p>
    </div>

    <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/16337cdf-affb-41c0-bd33-c43493b57f50_wo.png" />
      <h2 class="counter" data-target="843">0</h2>
      <p>Teams</p>
    </div>

    <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/23cbbc70-be02-40bf-a9fb-24c26eeaba20_wo.png" />
      <h2 class="counter" data-target="10000">0</h2>
      <p>Volunteers</p>
    </div>

    <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/fd6dfe64-c44e-48f5-99e2-28bb7086405b_wo.png" />
      <h2 class="counter" data-target="332">0</h2>
      <p>Referees</p>
    </div>
 
    <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/1438f624-c050-416f-9841-509c0c0f602f_wo.png" />
      <h2 class="counter" data-target="42">0</h2>
      <p>Affiliated Clubs</p>
    </div>
    
        <div class="stat">
      <img class="icon" src="https://prodcdn.sporty.co.nz/cms/10035/66425/979288/1438f624-c050-416f-9841-509c0c0f602f_wo.png" />
      <h2 class="counter" data-target="3500">0</h2>
      <p>Supported Via Football For All in 2025</p>
    </div>
    
  </div>
</div>

<script>
  const counters = document.querySelectorAll('.counter');
  let hasAnimated = false;

  function runCounters() {
    if (hasAnimated) return;
    hasAnimated = true;

    counters.forEach(counter => {
      const target = +counter.getAttribute('data-target');
      let count = 0;

      const step = () => {
        const increment = Math.ceil(target / 100);
        count += increment;

        if (count < target) {
          counter.innerText = count;
          requestAnimationFrame(step);
        } else {
          counter.innerText = target;
        }
      };

      step();
    });
  }

  // Trigger animation when section scrolls into view
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        runCounters();
        observer.disconnect();
      }
    });
  }, {
    threshold: 0.4
  });

  observer.observe(document.getElementById("stats"));
</script>

</body>
</html>
